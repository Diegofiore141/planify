<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planify - Offline</title>

    <!-- Stili inline: devono funzionare anche quando il bundle React non carica. -->
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: #0f172a;
        background:
          radial-gradient(circle at 15% 20%, rgba(96, 165, 250, 0.35), transparent 34%),
          radial-gradient(circle at 85% 25%, rgba(52, 211, 153, 0.28), transparent 32%),
          radial-gradient(circle at 50% 95%, rgba(167, 139, 250, 0.22), transparent 36%),
          #f8fafc;
        display: grid;
        place-items: center;
        padding: 24px;
        overflow: hidden;
      }

      .offline-card {
        width: min(920px, 100%);
        display: grid;
        grid-template-columns: 0.95fr 1.05fr;
        gap: 34px;
        align-items: center;
        padding: 42px;
        border-radius: 34px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(226, 232, 240, 0.95);
        box-shadow: 0 34px 100px rgba(15, 23, 42, 0.16);
        backdrop-filter: blur(18px);
        animation: cardEnter 0.55s ease both;
      }

      .offline-logo {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 26px;
        font-size: 24px;
        font-weight: 950;
      }

      .offline-logo-icon {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border-radius: 15px;
        background: #eff6ff;
        box-shadow: 0 12px 26px rgba(37, 99, 235, 0.18);
      }

      .offline-badge {
        display: inline-flex;
        margin-bottom: 16px;
        padding: 8px 14px;
        border-radius: 999px;
        background: #dbeafe;
        color: #1d4ed8;
        font-size: 13px;
        font-weight: 900;
      }

      h1 {
        margin: 0;
        font-size: clamp(42px, 6vw, 68px);
        line-height: 0.98;
        letter-spacing: -1.8px;
      }

      p {
        margin: 22px 0 0;
        color: #475569;
        font-size: 18px;
        line-height: 1.65;
      }

      .offline-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 30px;
      }

      .offline-button {
        border: 0;
        border-radius: 15px;
        padding: 14px 20px;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
        text-decoration: none;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          background 0.18s ease;
      }

      .offline-button:hover {
        transform: translateY(-2px);
      }

      .offline-button-primary {
        color: white;
        background: #2563eb;
        box-shadow: 0 16px 34px rgba(37, 99, 235, 0.28);
      }

      .offline-button-secondary {
        color: #1d4ed8;
        background: #eff6ff;
      }

      .offline-status {
        min-height: 22px;
        margin-top: 18px;
        color: #64748b;
        font-size: 14px;
        font-weight: 800;
      }

      .offline-visual {
        min-height: 390px;
        position: relative;
        display: grid;
        place-items: center;
      }

      .wifi-orbit {
        position: absolute;
        width: 310px;
        height: 310px;
        border-radius: 999px;
        border: 2px dashed rgba(37, 99, 235, 0.22);
        animation: rotateOrbit 16s linear infinite;
      }

      .wifi-dot {
        position: absolute;
        top: 22px;
        left: 50%;
        width: 18px;
        height: 18px;
        border-radius: 999px;
        background: #2563eb;
        transform: translateX(-50%);
        box-shadow: 0 0 26px rgba(37, 99, 235, 0.45);
      }

      .calendar-bot {
        position: relative;
        width: 235px;
        padding: 20px;
        border-radius: 30px;
        background: white;
        border: 1px solid #e2e8f0;
        box-shadow: 0 26px 70px rgba(15, 23, 42, 0.16);
        animation: floatBot 3.2s ease-in-out infinite;
      }

      .calendar-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }

      .calendar-rings {
        display: flex;
        gap: 8px;
      }

      .calendar-rings span {
        width: 12px;
        height: 22px;
        border-radius: 999px;
        background: #2563eb;
      }

      .calendar-face {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 9px;
      }

      .calendar-face span {
        height: 34px;
        border-radius: 11px;
        background: #eff6ff;
      }

      .calendar-face span:nth-child(2),
      .calendar-face span:nth-child(5) {
        background: #bfdbfe;
      }

      .calendar-face span:nth-child(8) {
        background: #bbf7d0;
      }

      .bot-eyes {
        display: flex;
        gap: 12px;
      }

      .bot-eyes span {
        width: 13px;
        height: 13px;
        border-radius: 999px;
        background: #0f172a;
        animation: blink 3s infinite;
      }

      .offline-cloud {
        position: absolute;
        right: 58px;
        top: 44px;
        padding: 12px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
        font-size: 24px;
        animation: cloudMove 4s ease-in-out infinite;
      }

      .offline-message {
        position: absolute;
        bottom: 34px;
        left: 50%;
        transform: translateX(-50%);
        width: max-content;
        max-width: 260px;
        padding: 12px 16px;
        border-radius: 18px;
        background: #0f172a;
        color: white;
        font-size: 14px;
        font-weight: 800;
        text-align: center;
        animation: messagePulse 2.4s ease-in-out infinite;
      }

      @keyframes cardEnter {
        from {
          opacity: 0;
          transform: translateY(14px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes rotateOrbit {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes floatBot {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-14px);
        }
      }

      @keyframes blink {
        0%,
        88%,
        100% {
          transform: scaleY(1);
        }

        92% {
          transform: scaleY(0.15);
        }
      }

      @keyframes cloudMove {
        0%,
        100% {
          transform: translateX(0) translateY(0);
        }

        50% {
          transform: translateX(-18px) translateY(8px);
        }
      }

      @keyframes messagePulse {
        0%,
        100% {
          opacity: 0.88;
          transform: translateX(-50%) scale(1);
        }

        50% {
          opacity: 1;
          transform: translateX(-50%) scale(1.03);
        }
      }

      @media (max-width: 820px) {
        .offline-card {
          grid-template-columns: 1fr;
          padding: 28px;
        }

        .offline-visual {
          min-height: 320px;
        }

        .wifi-orbit {
          width: 260px;
          height: 260px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>

  <body>
    <!-- Fallback statico mostrato dalla PWA quando manca la connessione. -->
    <main class="offline-card">
      <section>
        <div class="offline-logo">
          <div class="offline-logo-icon">📅</div>
          <span>Planify</span>
        </div>

        <span class="offline-badge">Modalità offline</span>

        <h1>Ops, la connessione si è presa una pausa.</h1>

        <p>
          Non riesco a raggiungere Internet in questo momento. Puoi controllare
          la rete e riprovare tra poco.
        </p>

        <div class="offline-actions">
          <button
            type="button"
            class="offline-button offline-button-primary"
            onclick="retryConnection()"
          >
            Riprova
          </button>

          <button
            type="button"
            class="offline-button offline-button-secondary"
            onclick="goHome()"
          >
            Torna alla home
          </button>
        </div>

        <p class="offline-status" id="offline-status" aria-live="polite"></p>
      </section>

      <section class="offline-visual" aria-hidden="true">
        <div class="wifi-orbit">
          <div class="wifi-dot"></div>
        </div>

        <div class="offline-cloud">📡</div>

        <div class="calendar-bot">
          <div class="calendar-top">
            <div class="calendar-rings">
              <span></span>
              <span></span>
            </div>

            <div class="bot-eyes">
              <span></span>
              <span></span>
            </div>
          </div>

          <div class="calendar-face">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>

        <div class="offline-message">Sto cercando il Wi-Fi...</div>
      </section>
    </main>

    <script>
      // Riprova la connessione usando lo stesso file statico controllato dall'app.
      const statusMessage = document.getElementById('offline-status')

      async function retryConnection() {
        statusMessage.textContent = 'Controllo connessione...'

        try {
          await fetch(`/online-check.txt?time=${Date.now()}`, {
            cache: 'no-store',
          })

          window.location.reload()
        } catch (error) {
          statusMessage.textContent =
            'Sei ancora offline. Riprova quando la connessione torna disponibile.'
        }
      }

      function goHome() {
        if (!navigator.onLine) {
          statusMessage.textContent =
            'Sei offline: per tornare alla home devi prima riconnetterti oppure premere Riprova.'
          return
        }

        window.location.href = '/'
      }
    </script>
  </body>
</html>
