<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planify - Offline</title>

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 35%),
          linear-gradient(135deg, #eef2ff 0%, #f8fafc 50%, #e0f2fe 100%);
        color: #0f172a;
      }

      .offline-card {
        width: min(90%, 460px);
        padding: 34px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 25px 70px rgba(15, 23, 42, 0.14);
        text-align: center;
      }

      img {
        width: 82px;
        height: 82px;
        border-radius: 18px;
        object-fit: cover;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }

      p {
        color: #64748b;
        line-height: 1.6;
        margin-bottom: 24px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 13px 22px;
        background: #2563eb;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: #1d4ed8;
      }

      #status-message {
        margin-top: 18px;
        margin-bottom: 0;
        color: #64748b;
        font-size: 14px;
        font-weight: 700;
      }
    </style>
  </head>

  <body>
    <main class="offline-card">
      <img src="/logo.png" alt="Logo Planify" />

      <h1>Sei offline</h1>

      <p>
        Al momento non hai connessione. Planify mostra questa pagina offline
        invece del normale errore del browser.
      </p>

      <button onclick="handleRetry()">Riprova</button>

      <p id="status-message"></p>
    </main>

    <script>
      async function handleRetry() {
        const statusMessage = document.getElementById('status-message')
        statusMessage.textContent = 'Controllo connessione...'

        try {
          await fetch('/online-check.txt?time=' + Date.now(), {
            cache: 'no-store',
          })

          window.location.reload()
        } catch (error) {
          statusMessage.textContent =
            'Sei ancora offline. Riprova quando la connessione torna disponibile.'
        }
      }
    </script>
  </body>
</html>
